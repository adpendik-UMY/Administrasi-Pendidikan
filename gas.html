<body>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card">

        <div class="card-header bg-primary text-white text-center">
          <img src="https://lh3.googleusercontent.com/d/1OAkLf4qUE4xrs-xHx-_P2QucrBR-nxSg" alt="Logo Instansi" class="header-logo">
          <h4 style="font-weight:bold ; color: #020631; font-family: france;">
            FORM INPUT VERIFIKASI IJAZAH</h4>
        </div>

        <div class="card-body">
          <form id="formSurat">

            <div class="row mb-3">
              <div class="col-md-9">
                <input type="text" id="cari_nim" class="form-control" placeholder="Masukkan NIM / NIPP untuk mencari data tersimpan..."
                  onkeypress="if(event.key==='Enter'){event.preventDefault(); cariData();}">
              </div>
              <div class="col-md-3">
                <button type="button" class="btn btn-primary w-100" onclick="cariData()">Cari Data</button>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Nama Lengkap <span class="required">*</span></label>
              <input type="text" id="nama" class="form-control" placeholder="Masukkan Nama Lengkap" required>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Tempat Lahir</label>
                <input type="text" id="tempat_lahir" class="form-control" placeholder="Masukkan Temat Lahir" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Tanggal Lahir</label>
                <input type="date" id="tanggal_lahir" class="form-control" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">NIM / NIPP <span class="required">*</span></label>
              <input type="text" id="nim" class="form-control" placeholder="Masukkan NIM / NIPP" required>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Fakultas</label>
                <input type="text" id="fakultas" class="form-control" placeholder="Masukkan Fakultas" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Program Studi</label>
                <input type="text" id="prodi" class="form-control" placeholder="Masukkan Program Studi" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Nomor Seri Ijazah</label>
              <input type="text" id="nomor_seri" class="form-control" placeholder="Masukkan Nomor Seri Ijazah">
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Tanggal Lulus</label>
                <input type="date" id="tanggal_lulus" class="form-control">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Tanggal Ijazah</label>
                <input type="date" id="tanggal_ijazah" class="form-control" required>
              </div>
            </div>

            <hr>

            <h6>Pilih Jenis Surat</h6>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="template" value="1" checked>
              <label class="form-check-label">Sudah di laporkan di PDDIKTI</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="template" value="2">
              <label class="form-check-label">Belum di laporkan di PDDIKTI</label>
            </div>
            <div class="form-check mb-4">
              <input class="form-check-input" type="radio" name="template" value="3">
              <label class="form-check-label">Stattement Letter</label>
            </div>

            <button id="btnSimpan" type="button" class="btn btn-success" onclick="simpanData()">
              Buat Surat
            </button>

          </form>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
// ==========================================
// FUNGSI CARI DATA NIM
// ==========================================
function cariData() {
  const nim = document.getElementById("cari_nim").value.trim();

  if (!nim) {
    Swal.fire({
      title: 'Perhatian!',
      text: 'Silakan masukkan NIM / NIPP terlebih dahulu.',
      icon: 'warning',
      confirmButtonColor: '#0d6efd'
    });
    return;
  }

  // Loading Pop-up saat mencari data
  Swal.fire({
    title: 'Mencari Data...',
    text: 'Mohon tunggu sebentar',
    allowOutsideClick: false,
    didOpen: () => { Swal.showLoading(); }
  });

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.ditemukan) {
        Swal.fire({
          title: 'Gagal!',
          text: 'Data mahasiswa tidak ditemukan.',
          icon: 'error',
          confirmButtonText: 'Coba Lagi',
          confirmButtonColor: '#dc3545'
        });
        return;
      }

      // Autofill Form fields
      document.getElementById("nama").value = res.nama || "";
      document.getElementById("tempat_lahir").value = res.tempat_lahir || "";
      document.getElementById("nim").value = res.nim || "";
      document.getElementById("fakultas").value = res.fakultas || "";
      document.getElementById("prodi").value = res.prodi || "";
      document.getElementById("nomor_seri").value = res.nomor_seri || "";

      // Format aman untuk tanggal lahir HTML input
      if (res.tanggal_lahir) {
        const d = new Date(res.tanggal_lahir);
        if (!isNaN(d.getTime())) {
          document.getElementById("tanggal_lahir").value = d.toISOString().split("T")[0];
        }
      }

      // Kunci input agar tidak bisa diubah manual
      ["nama","tempat_lahir","tanggal_lahir","nim","fakultas","prodi","nomor_seri"]
        .forEach(id => document.getElementById(id).readOnly = true);

      // Pop-up sukses menemukan data
      Swal.fire({
        title: 'Berhasil!',
        text: `Data mahasiswa bernama ${res.nama} berhasil ditemukan.`,
        icon: 'success',
        confirmButtonText: 'Lanjutkan',
        confirmButtonColor: '#198754'
      });
    })
    .withFailureHandler(function(err) {
      console.log("ERROR GAS:", err);
      Swal.fire({
        title: 'Error Sistem!',
        text: err.message || err,
        icon: 'error',
        confirmButtonColor: '#dc3545'
      });
    })
    .getDataByNim(nim);
}

// ==========================================
// FUNGSI GENERATE & SIMPAN SURAT
// ==========================================
function simpanData() {
  const btn = document.getElementById("btnSimpan");

  const data = {
    nama: document.getElementById("nama").value,
    tempat_lahir: document.getElementById("tempat_lahir").value,
    tanggal_lahir: document.getElementById("tanggal_lahir").value,
    nim: document.getElementById("nim").value,
    fakultas: document.getElementById("fakultas").value,
    prodi: document.getElementById("prodi").value,
    nomor_seri: document.getElementById("nomor_seri").value,
    tanggal_lulus: document.getElementById("tanggal_lulus").value,
    tanggal_ijazah: document.getElementById("tanggal_ijazah").value,
    template: document.querySelector('input[name="template"]:checked').value
  };

  // Validasi Kelengkapan Data
  if (!data.nama || !data.nim || !data.nomor_seri || !data.tanggal_ijazah) {
    Swal.fire({
      title: 'Data Tidak Lengkap!',
      text: 'Harap pastikan Nama, NIM, No. Seri Ijazah, dan Tanggal Ijazah terisi.',
      icon: 'warning',
      confirmButtonColor: '#fd7e14'
    });
    return;
  }

  btn.disabled = true;

  // Pop-up Loading Generator Surat
  Swal.fire({
    title: 'Memproses Dokumen...',
    text: 'Sistem sedang menyusun surat dan mengonversi berkas.',
    allowOutsideClick: false,
    didOpen: () => { Swal.showLoading(); }
  });

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false;

      if (!res || res.success === false) {
        Swal.fire({
          title: 'Gagal Membuat Surat!',
          text: res?.message || 'Terjadi kesalahan internal pada template.',
          icon: 'error',
          confirmButtonColor: '#dc3545'
        });
        return;
      }

      // 🔥 POP-UP UTAMA: Berhasil Menyusun Dokumen Beserta Akses Link Unduhan 🔥
      Swal.fire({
        title: 'Surat Berhasil Dibuat!',
        html: `
          <p class="mb-3"><strong>Nomor Surat:</strong><br><span class="badge bg-secondary fs-6">${res.nomor}</span></p>
          <div class="d-flex flex-column gap-2 px-3">
            <a href="${res.docx}" target="_blank" class="btn btn-primary w-100">Download Word (.docx)</a>
            <a href="${res.pdf}" target="_blank" class="btn btn-danger w-100">Download PDF (.pdf)</a>
            <a href="${res.edit}" target="_blank" class="btn btn-success w-100">Edit Dokumen Asli</a>
          </div>
        `,
        icon: 'success',
        showCancelButton: true,
        confirmButtonText: 'Input Data Baru',
        cancelButtonText: 'Tutup',
        confirmButtonColor: '#6c757d',
        cancelButtonColor: '#3085d6'
      }).then((result) => {
        if (result.isConfirmed) {
          resetForm();
        }
      });

    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      console.log("ERROR GAS:", err);
      Swal.fire({
        title: 'Koneksi Gagal!',
        text: err.message || err,
        icon: 'error',
        confirmButtonColor: '#dc3545'
      });
    })
    .simpanData(data);
}

// ==========================================
// FUNGSI RESET FORM
// ==========================================
function resetForm() {
  document.getElementById("formSurat").reset();

  ["nama","tempat_lahir","tanggal_lahir","nim","fakultas","prodi","nomor_seri"]
    .forEach(id => { document.getElementById(id).readOnly = false; });

  document.getElementById("cari_nim").focus();
}
</script>

  // Pop-up Loading Generator Surat
  Swal.fire({
    title: 'Memproses Dokumen...',
    text: 'Sistem sedang menyusun surat dan mengonversi berkas.',
    allowOutsideClick: false,
    didOpen: () => { Swal.showLoading(); }
  });

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false;

      if (!res || res.success === false) {
        Swal.fire({
          title: 'Gagal Membuat Surat!',
          text: res?.message || 'Terjadi kesalahan internal pada template.',
          icon: 'error',
          confirmButtonColor: '#dc3545'
        });
        return;
      }

      // 🔥 POP-UP UTAMA: Berhasil Menyusun Dokumen Beserta Akses Link Unduhan 🔥
      Swal.fire({
        title: 'Surat Berhasil Dibuat!',
        html: `
          <p class="mb-3"><strong>Nomor Surat:</strong><br><span class="badge bg-secondary fs-6">${res.nomor}</span></p>
          <div class="d-flex flex-column gap-2 px-3">
            <a href="${res.docx}" target="_blank" class="btn btn-primary w-100">Download Word (.docx)</a>
            <a href="${res.pdf}" target="_blank" class="btn btn-danger w-100">Download PDF (.pdf)</a>
            <a href="${res.edit}" target="_blank" class="btn btn-success w-100">Edit Dokumen Asli</a>
          </div>
        `,
        icon: 'success',
        showCancelButton: true,
        confirmButtonText: 'Input Data Baru',
        cancelButtonText: 'Tutup',
        confirmButtonColor: '#6c757d',
        cancelButtonColor: '#3085d6'
      }).then((result) => {
        if (result.isConfirmed) {
          resetForm();
        }
      });

    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      console.log("ERROR GAS:", err);
      Swal.fire({
        title: 'Koneksi Gagal!',
        text: err.message || err,
        icon: 'error',
        confirmButtonColor: '#dc3545'
      });
    })
    .simpanData(data);
}

// ==========================================
// FUNGSI RESET FORM
// ==========================================
function resetForm() {
  document.getElementById("formSurat").reset();

  ["nama","tempat_lahir","tanggal_lahir","nim","fakultas","prodi","nomor_seri"]
    .forEach(id => { document.getElementById(id).readOnly = false; });

  document.getElementById("cari_nim").focus();
}
</script>
